<style>
    :root {
        --bg-color: #0b0e14;
        --card-bg: rgba(255, 255, 255, 0.05);
        --accent-blue: #00d4ff;
        --accent-green: #00ff88;
        --accent-pink: #ff007f;
        --accent-red: #ff4d4d;
        --text-main: #ffffff;
        --text-dim: #a0a0a0;
    }

    body {
        background-color: var(--bg-color);
        color: var(--text-main);
        font-family: 'Segoe UI', sans-serif;
        margin: 0; padding: 15px;
        display: flex; justify-content: center;
    }

    .dashboard { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; }

    .card {
        background: var(--card-bg);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 15px;
        padding: 20px;
        backdrop-filter: blur(10px);
    }

    .card-hero {
        padding: 35px 25px;
        border: 1px solid rgba(0, 212, 255, 0.3);
        background: linear-gradient(145deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .header-row {
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;
    }

    #view-day-label { font-size: 2.2rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
    #main-percent { font-size: 1.8rem; font-weight: 900; color: var(--accent-blue); text-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }

    .btn-circle {
        width: 36px; height: 36px; border-radius: 50%; border: none;
        font-weight: bold; font-size: 20px; cursor: pointer;
        display: flex; align-items: center; justify-content: center; transition: 0.2s;
    }
    .btn-green { background: var(--accent-green); color: #000; }
    .btn-red { background: var(--accent-red); color: #fff; margin-left: 8px; }
    .btn-nav { background: rgba(255,255,255,0.1); color: white; width: 28px; height: 28px; font-size: 14px; border:none; cursor:pointer; border-radius: 50%; }

    /* KALENDÁR */
    .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
    .cal-day {
        aspect-ratio: 1/1.3; display: flex; flex-direction: column; justify-content: center;
        background: rgba(255,255,255,0.03); border-radius: 6px; cursor: pointer; border: 1px solid transparent;
        padding: 2px; position: relative;
    }
    .cal-day.today { border-color: var(--accent-green); background: rgba(0,255,136,0.05); }
    .cal-day.selected { border-color: var(--accent-blue); background: rgba(0,212,255,0.1); }
    
    .cal-num { font-weight: bold; font-size: 13px; }
    .cal-alert { position: absolute; top: 3px; right: 4px; color: var(--accent-red); font-weight: bold; font-size: 12px; }
    .cal-status-left { position: absolute; top: 3px; left: 4px; font-weight: bold; font-size: 10px; }
    .status-check { color: var(--accent-green); }
    .status-x { color: var(--accent-red); }

    .cal-perc { font-size: 9px; color: var(--accent-blue); font-weight: bold; margin: 1px 0; }
    .cal-fin-result { font-size: 9px; font-weight: bold; margin-top: 2px; }

    /* ÚLOHY */
    .task-item { 
        display: flex; align-items: center; justify-content: space-between; 
        background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; margin-bottom: 8px; font-size: 1.1rem;
    }
    .status-cancelled { text-decoration: line-through; color: var(--text-dim); opacity: 0.4; }
    .status-done { text-decoration: line-through; color: var(--accent-green); }

    /* PROGRES LIŠTY */
    .progress-container { height: 14px; background: #222; border-radius: 7px; margin: 15px auto; width: 100%; overflow: hidden; display: flex; position: relative; }
    .goal-marker { position: absolute; top: 0; width: 4px; height: 100%; background: white; box-shadow: 0 0 10px white; z-index: 10; display:none; }

    /* HABITY */
    .habit-pool { display: flex; flex-wrap: wrap; gap: 8px; }
    .habit-chip { 
        background: rgba(0, 212, 255, 0.1); border: 1px solid var(--accent-blue); color: white; 
        padding: 10px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; 
        user-select: none; transition: transform 0.1s;
    }
    .habit-chip:active { transform: scale(0.95); }
</style>

<div class="dashboard">
    <div class="card card-hero">
        <div class="header-row">
            <button class="btn-circle btn-green" onclick="promptTask()">+</button>
            <h2 id="view-day-label">--. --</h2>
            <div id="main-percent">0%</div>
        </div>
        <div class="progress-container">
            <div id="main-bar" style="width: 0%; height: 100%; background: var(--accent-blue); box-shadow: 0 0 15px var(--accent-blue); transition: 0.6s;"></div>
        </div>
        <div id="active-tasks-list" style="margin-top:20px;"></div>
    </div>

    <div class="card">
        <div class="header-row" style="border:none; margin-bottom:5px;">
            <button class="btn-nav" onclick="changeMonth(-1)"><</button>
            <h2 id="monthLabel" style="margin:0; font-size: 1.1rem; font-weight: bold;">Mesiac</h2>
            <button class="btn-nav" onclick="changeMonth(1)">></button>
        </div>
        <div class="month-grid" id="monthGrid"></div>
    </div>

    <div class="card">
        <div class="header-row">
            <div style="display:flex;">
                <button class="btn-circle btn-green" onclick="addFinance('in')">+</button>
                <button class="btn-circle btn-red" onclick="addFinance('out')">+</button>
            </div>
            <h2 style="margin:0; font-size: 1rem; color: var(--accent-blue);">Denné financie</h2>
        </div>
        <div style="text-align:center;">
            <div id="day-balance" style="font-size: 1.8rem; font-weight:bold;">0.00 €</div>
            <div style="font-size: 0.9rem; color: var(--text-dim); margin-top:5px;">
                Príjem: <span id="day-in" style="color:var(--accent-green);">0€</span> | 
                Výdavok: <span id="day-out" style="color:var(--accent-red);">0€</span>
            </div>
        </div>
    </div>

    <div class="card" style="border: 1px solid rgba(0, 212, 255, 0.3);">
        <div class="header-row" style="border:none; margin-bottom:0;">
            <div style="width:36px;"></div>
            <h2 style="margin:0; font-size: 0.8rem; text-align:center; color: var(--text-dim); text-transform: uppercase;">Celkový zostatok</h2>
            <button class="btn-circle btn-green" style="width:28px; height:28px; font-size:16px;" onclick="promptGoal()">+</button>
        </div>
        <div id="totalBalanceVal" style="font-size: 2.5rem; font-weight: bold; text-align: center; margin: 10px 0;">0.00 €</div>
        <div class="progress-container" style="height: 12px; background: #1a1a1a; overflow: visible;">
            <div id="total-bar-fill" style="width: 0%; height: 100%; background: var(--accent-green); border-radius: 6px; transition: 0.5s;"></div>
            <div id="goalMarker" class="goal-marker" style="left: 100%;"></div>
        </div>
        <div id="goal-info" style="font-size: 0.85rem; color: var(--accent-blue); text-align: center; margin-top: 5px; font-style: italic;">Nastav si cieľ cez +</div>
    </div>

    <div class="card">
        <div class="header-row" style="border:none; margin-bottom: 10px;">
            <h2 style="color: var(--accent-blue); font-size: 0.9rem; margin:0;">Rýchle návyky</h2>
            <button class="btn-circle btn-green" style="width:28px; height:28px; font-size:16px;" onclick="promptNewHabit()">+</button>
        </div>
        <p style="font-size: 0.7rem; color: gray; margin-top:-5px; margin-bottom:10px;">(Klikni pre pridanie, podrž pre vymazanie)</p>
        <div class="habit-pool" id="habitPool"></div>
    </div>
</div>

<script>
    let today = new Date();
    let viewingDate = new Date(); 
    let calendarMonth = new Date(); calendarMonth.setDate(1);

    let taskData = JSON.parse(localStorage.getItem('prod_tasks_final')) || {};
    let financeData = JSON.parse(localStorage.getItem('prod_finance_final')) || {}; 
    let habitList = JSON.parse(localStorage.getItem('prod_habits_final')) || ["Voda 💧", "Učiť sa 🧠", "Cvičiť 🏋️"];
    let savingsGoal = JSON.parse(localStorage.getItem('prod_goal')) || { name: "", amount: 0 };

    const monthNames = ["Január", "Február", "Marec", "Apríl", "Máj", "Jún", "Júl", "August", "September", "Október", "November", "December"];

    function init() { renderHabits(); renderMonth(); refreshView(); }

    /* HABIT LOGIKA */
    function renderHabits() {
        const p = document.getElementById('habitPool'); p.innerHTML = '';
        habitList.forEach((txt, index) => {
            const c = document.createElement('div');
            c.className = 'habit-chip';
            c.innerText = txt;
            
            let timer;
            c.onmousedown = c.ontouchstart = () => {
                timer = setTimeout(() => {
                    if(confirm(`Odstrániť návyk "${txt}" zo zoznamu?`)) {
                        habitList.splice(index, 1);
                        localStorage.setItem('prod_habits_final', JSON.stringify(habitList));
                        renderHabits();
                    }
                    timer = null;
                }, 800);
            };
            c.onmouseup = c.onmouseleave = c.ontouchend = () => {
                if(timer) {
                    clearTimeout(timer);
                    addTask(txt);
                }
            };
            p.appendChild(c);
        });
    }

    function promptNewHabit() {
        const n = prompt("Nový návyk:");
        if(n) { habitList.push(n); localStorage.setItem('prod_habits_final', JSON.stringify(habitList)); renderHabits(); }
    }

    /* OSTATNÁ LOGIKA */
    function promptGoal() {
        const name = prompt("Čo je tvoj cieľ? (napr. Auto)");
        const amount = parseFloat(prompt("Koľko to stojí? (€)"));
        if(name && !isNaN(amount)) { savingsGoal = { name, amount }; localStorage.setItem('prod_goal', JSON.stringify(savingsGoal)); updateTotalFinance(); }
    }

    function renderMonth() {
        const grid = document.getElementById('monthGrid'); grid.innerHTML = '';
        const year = calendarMonth.getFullYear();
        const month = calendarMonth.getMonth();
        const label = document.getElementById('monthLabel');
        label.innerText = `${monthNames[month]} ${year}`;
        label.style.color = (month === today.getMonth() && year === today.getFullYear()) ? 'var(--accent-green)' : 'var(--accent-red)';

        ['Po','Ut','St','Št','Pi','So','Ne'].forEach(d => grid.innerHTML += `<div style="font-size:9px; color:gray; font-weight:bold;">${d}</div>`);
        let offset = (new Date(year, month, 1).getDay() || 7) - 1;
        for (let i = 0; i < offset; i++) grid.innerHTML += `<div></div>`;
        for (let d = 1; d <= new Date(year, month + 1, 0).getDate(); d++) {
            const dayKey = `${year}-${month}-${d}`;
            const tasks = taskData[dayKey] || [];
            const activeTasks = tasks.filter(t => !t.cancelled);
            const unfinished = activeTasks.some(t => !t.done);
            const allDone = activeTasks.length > 0 && activeTasks.every(t => t.done);
            const noTasksAtAll = tasks.length === 0 || tasks.every(t => t.cancelled);
            const perc = activeTasks.length ? Math.round((activeTasks.filter(t => t.done).length / activeTasks.length) * 100) : 0;
            const fin = financeData[dayKey] || {in: 0, out: 0};
            const dailyDiff = fin.in - fin.out;
            let finClass = (dailyDiff > 0) ? "color:var(--accent-green)" : (dailyDiff < 0 ? "color:var(--accent-red)" : "");
            let finText = dailyDiff !== 0 ? (dailyDiff > 0 ? "+" + Math.round(dailyDiff) : Math.round(dailyDiff)) : "";
            let leftIcon = allDone ? '<span class="cal-status-left status-check">✓</span>' : (noTasksAtAll ? '<span class="cal-status-left status-x">x</span>' : '');

            grid.innerHTML += `<div class="cal-day ${(d === today.getDate() && month === today.getMonth() && year === today.getFullYear()) ? 'today' : ''} ${(d === viewingDate.getDate() && month === viewingDate.getMonth() && year === viewingDate.getFullYear()) ? 'selected' : ''}" onclick="selectDay(${d})">${leftIcon}${unfinished ? '<span class="cal-alert">!</span>' : ''}<span class="cal-num">${d}</span><span class="cal-perc">${perc > 0 ? perc+'%' : ''}</span><div class="cal-fin-result" style="${finClass}">${finText}</div></div>`;
        }
    }

    function selectDay(d) { viewingDate = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth(), d); renderMonth(); refreshView(); }
    function changeMonth(dir) { calendarMonth.setMonth(calendarMonth.getMonth() + dir); renderMonth(); }

    function refreshView() {
        const dk = `${viewingDate.getFullYear()}-${viewingDate.getMonth()}-${viewingDate.getDate()}`;
        document.getElementById('view-day-label').innerText = `${viewingDate.getDate()}. ${monthNames[viewingDate.getMonth()]}`;
        renderTasks(dk);
        const fin = financeData[dk] || {in: 0, out: 0};
        const balance = fin.in - fin.out;
        document.getElementById('day-balance').innerText = balance.toFixed(2) + " €";
        document.getElementById('day-balance').style.color = balance >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
        document.getElementById('day-in').innerText = fin.in.toFixed(2) + " €";
        document.getElementById('day-out').innerText = fin.out.toFixed(2) + " €";
        updateTotalFinance();
    }

    function renderTasks(dk) {
        const container = document.getElementById('active-tasks-list'); container.innerHTML = '';
        const tasks = taskData[dk] || [];
        tasks.forEach((t, i) => {
            let sClass = t.cancelled ? 'status-cancelled' : (t.done ? 'status-done' : '');
            container.innerHTML += `<div class="task-item"><span class="${sClass}"><input type="checkbox" style="transform: scale(1.4); margin-right: 10px;" ${t.done ? 'checked' : ''} ${t.cancelled ? 'disabled' : ''} onchange="toggleTask(${i})"> ${t.text}</span><button class="btn-nav" style="border:none; color:var(--accent-red);" onclick="removeTask(${i})">🗑</button></div>`;
        });
        const active = tasks.filter(t => !t.cancelled);
        const p = active.length ? Math.round((active.filter(t => t.done).length / active.length) * 100) : 0;
        document.getElementById('main-percent').innerText = p + "%";
        document.getElementById('main-bar').style.width = p + "%";
    }

    function updateTotalFinance() {
        let ti = 0, to = 0; Object.values(financeData).forEach(f => { ti += f.in; to += f.out; });
        const balance = ti - to;
        document.getElementById('totalBalanceVal').innerText = balance.toFixed(2) + " €";
        document.getElementById('totalBalanceVal').style.color = balance >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
        if(savingsGoal.amount > 0) {
            document.getElementById('goalMarker').style.display = "block";
            document.getElementById('total-bar-fill').style.width = Math.max(0, Math.min(100, (balance / savingsGoal.amount) * 100)) + "%";
            document.getElementById('goal-info').innerText = balance >= savingsGoal.amount ? `⭐ ${savingsGoal.name} HOTOVO! ⭐` : `Cieľ: ${savingsGoal.name} (chýba ${(savingsGoal.amount - balance).toFixed(2)} €)`;
        }
    }

    function toggleTask(i) { const dk = `${viewingDate.getFullYear()}-${viewingDate.getMonth()}-${viewingDate.getDate()}`; taskData[dk][i].done = !taskData[dk][i].done; save(); }
    function removeTask(i) { const dk = `${viewingDate.getFullYear()}-${viewingDate.getMonth()}-${viewingDate.getDate()}`; taskData[dk].splice(i,1); save(); }
    function addTask(txt) { const dk = `${viewingDate.getFullYear()}-${viewingDate.getMonth()}-${viewingDate.getDate()}`; if(!taskData[dk]) taskData[dk] = []; taskData[dk].push({text: txt, done: false, cancelled: false}); save(); }
    function promptTask() { const t = prompt("Nová úloha:"); if(t) addTask(t); }
    function addFinance(type) { const v = parseFloat(prompt("Suma:")); if(!isNaN(v)) { const dk = `${viewingDate.getFullYear()}-${viewingDate.getMonth()}-${viewingDate.getDate()}`; if(!financeData[dk]) financeData[dk] = {in:0, out:0}; financeData[dk][type] += v; save(); } }
    function save() { localStorage.setItem('prod_tasks_final', JSON.stringify(taskData)); localStorage.setItem('prod_finance_final', JSON.stringify(financeData)); renderMonth(); refreshView(); }

    init();
</script>
